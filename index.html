<!DOCTYPE html>
<html lang="es">
<head>

	<meta charset="UTF-8" />

	<meta
		name="viewport"
		content="width=device-width, initial-scale=1.0, viewport-fit=cover"
	/>

	<title>Outfit App</title>

	<link rel="stylesheet" href="style.css" />

</head>
<body>

	<header class="header">

		<h1>Outfit</h1>

		<button id="closetBtn" class="closet-btn">
			Mi ropa
		</button>

	</header>

	<main class="container">

		<section class="outfit-section">

			<div class="clothing-slot">
				<img id="topImage" src="" alt="">
			</div>

			<div class="clothing-slot">
				<img id="bottomImage" src="" alt="">
			</div>

			<div class="clothing-slot shoes">
				<img id="shoesImage" src="" alt="">
			</div>

		</section>

		<button id="generateBtn" class="generate-btn">
			Generar Outfit
		</button>

		<section class="upload-section">

			<h2>Agregar prenda</h2>

			<select id="typeSelect">

				<option value="top">
					Parte superior
				</option>

				<option value="bottom">
					Parte inferior
				</option>

				<option value="shoes">
					Calzado
				</option>

			</select>

			<input
				type="file"
				id="fileInput"
				accept="image/*"
			>

			<button id="saveBtn">
				Guardar
			</button>

		</section>

	</main>





	<div id="closetModal" class="closet-modal">

		<div class="closet-header">

			<h2>Mi ropa</h2>

			<button id="closeClosetBtn">
				Cerrar
			</button>

		</div>

		<div class="closet-content">

			<section class="category-section">

				<h3>Parte superior</h3>

				<div
					id="topGrid"
					class="clothes-grid"
				></div>

			</section>

			<section class="category-section">

				<h3>Parte inferior</h3>

				<div
					id="bottomGrid"
					class="clothes-grid"
				></div>

			</section>

			<section class="category-section">

				<h3>Calzado</h3>

				<div
					id="shoesGrid"
					class="clothes-grid"
				></div>

			</section>

		</div>

	</div>

	<script src="storage.js"></script>
	<script src="app.js"></script>

</body>
</html>
